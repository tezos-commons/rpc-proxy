name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -o rpc-proxy-linux-${{ matrix.goarch }} .
      - uses: actions/upload-artifact@v4
        with:
          name: rpc-proxy-linux-${{ matrix.goarch }}
          path: rpc-proxy-linux-${{ matrix.goarch }}

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build docs image
        run: docker build -t rpc-proxy-docs ./docs_website
